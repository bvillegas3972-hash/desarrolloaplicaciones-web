<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Web</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="app" aria-label="Calculadora web funcional">
    <section class="calculator" aria-label="Calculadora">
      <header class="calculator__header">
        <p class="calculator__eyebrow">BIENVENIDOS😎</p>
        <h1>Calculadora Web</h1>
      </header>

      <section class="display" aria-live="polite">
        <div class="display__operation" id="operationDisplay">Listo</div>
        <output class="display__result" id="resultDisplay">0</output>
      </section>

      <section class="keys" aria-label="Botones de la calculadora">
        <button class="key key--utility" type="button" data-action="clear">AC</button>
        <button class="key key--utility" type="button" data-action="delete">DEL</button>
        <button class="key key--utility" type="button" data-action="percent">%</button>
        <button class="key key--operator" type="button" data-action="operator" data-operator="/">÷</button>

        <button class="key" type="button" data-number="7">7</button>
        <button class="key" type="button" data-number="8">8</button>
        <button class="key" type="button" data-number="9">9</button>
        <button class="key key--operator" type="button" data-action="operator" data-operator="*">×</button>

        <button class="key" type="button" data-number="4">4</button>
        <button class="key" type="button" data-number="5">5</button>
        <button class="key" type="button" data-number="6">6</button>
        <button class="key key--operator" type="button" data-action="operator" data-operator="-">−</button>

        <button class="key" type="button" data-number="1">1</button>
        <button class="key" type="button" data-number="2">2</button>
        <button class="key" type="button" data-number="3">3</button>
        <button class="key key--operator" type="button" data-action="operator" data-operator="+">+</button>

        <button class="key key--utility" type="button" data-action="sign">±</button>
        <button class="key" type="button" data-number="0">0</button>
        <button class="key" type="button" data-action="decimal">.</button>
        <button class="key key--equals" type="button" data-action="equals">=</button>
      </section>
    </section>
  </main>
</body>
</html>
